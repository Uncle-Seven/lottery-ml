# .github/workflows/update.yml
name: 🎱 Update Lottery Data

on:
  schedule:
    - cron: '30 14 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: pip install -r requirements.txt
      
      - name: 🔧 Initialize data files
        run: |
          mkdir -p docs/data
          # 确保 history.json 存在且是有效的 JSON
          if [ ! -f docs/data/history.json ] || [ ! -s docs/data/history.json ]; then
            echo "[]" > docs/data/history.json
            echo "📁 初始化 history.json"
          fi
          # 验证 JSON 格式
          python -c "import json; json.load(open('docs/data/history.json'))" || echo "[]" > docs/data/history.json
      
      - name: 🕷️ Fetch latest data
        run: python scripts/fetch_data.py
        env:
          DATA_URL: ${{ secrets.DATA_URL }}
      
      - name: 📊 Generate analysis and predictions
        run: python scripts/generate_all.py
      
      - name: 📤 Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/data/
          
          if git diff --staged --quiet; then
            echo "📭 No changes to commit"
          else
            git commit -m "📊 Update data $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "📬 Changes committed and pushed"
          fi

  deploy-pages:
    needs: update-data
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v4
      
      - name: 📦 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'
      
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
